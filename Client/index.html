<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dice Card Game</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="brand-panel" aria-label="Game preview">
        <div class="dice-scene" aria-hidden="true">
          <div class="die die-one"><span></span></div>
          <div class="die die-two"><span></span><span></span></div>
          <div class="card-stack">
            <div class="card card-back"></div>
            <div class="card card-front">A</div>
          </div>
        </div>
        <div>
          <p class="eyebrow">Online Room</p>
          <h1>Dice Card Game</h1>
          <p class="intro">建立房間、邀請玩家，從等待室一路完成排牌、擲骰、翻牌與結算。</p>
        </div>
      </section>

      <section class="lobby-panel" id="lobbyView">
        <div class="panel-heading">
          <p class="eyebrow">Lobby</p>
          <h2>進入房間</h2>
        </div>

        <label class="field">
          <span>暱稱</span>
          <input id="nameInput" maxlength="18" autocomplete="nickname" placeholder="例如：Joey" />
        </label>

        <div class="actions">
          <button id="createRoomButton" class="primary-button" type="button">建立房間</button>
        </div>

        <div class="join-row">
          <label class="field">
            <span>房號</span>
            <input id="roomCodeInput" maxlength="5" autocomplete="off" placeholder="A7K2Q" />
          </label>
          <button id="joinRoomButton" class="secondary-button" type="button">加入</button>
        </div>

        <p class="message" id="lobbyMessage" role="status"></p>
      </section>

      <section class="room-panel hidden" id="roomView">
        <div class="room-topbar">
          <div>
            <p class="eyebrow">Room</p>
            <h2>房間</h2>
          </div>
          <button id="settingsButton" class="icon-button" type="button" aria-label="設定" aria-expanded="false" aria-controls="settingsMenu">設定</button>
          <div id="settingsMenu" class="settings-backdrop hidden">
            <div class="settings-menu" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
              <div class="settings-heading">
                <h3 id="settingsTitle">設定</h3>
                <button id="settingsCloseButton" class="ghost-button compact-button" type="button">關閉</button>
              </div>
              <div class="settings-room-code">
                <span>房號</span>
                <strong id="settingsRoomCode"></strong>
              </div>
              <button id="copyCodeButton" class="secondary-button full-width" type="button">複製房號</button>
              <button id="leaveRoomButton" class="danger-button full-width" type="button">離開房間</button>
            </div>
          </div>
        </div>

        <div class="status-strip">
          <span id="roomStatus">等待玩家</span>
          <span id="playerCount">0 / 4</span>
        </div>

        <ul class="player-list" id="playerList"></ul>

        <button id="startGameButton" class="primary-button full-width" type="button">開始遊戲</button>

        <section class="game-panel hidden" id="gamePanel" aria-label="遊戲畫面">
          <div class="game-heading">
            <div>
              <p class="eyebrow">Game</p>
              <h3 id="gamePhaseTitle">等待開始</h3>
            </div>
            <div class="turn-pill" id="turnIndicator">尚未開始</div>
          </div>

          <div class="dice-result" id="diceResult">骰子結果：尚無</div>

          <div class="game-section hidden" id="draftPanel">
            <div class="section-heading">
              <h4>抽牌選擇</h4>
              <p id="draftHint">從 10 張候選牌中選出 6 張。</p>
            </div>
            <div class="draft-grid" id="draftCards"></div>
          </div>

          <div class="game-section hidden" id="arrangePanel">
            <div class="section-heading">
              <h4>排列手牌</h4>
              <p id="arrangeHint">用上移、下移調整第 1～6 位。</p>
            </div>
            <div class="slot-grid" id="arrangeSlots"></div>
            <div class="hand-grid" id="handCards"></div>
            <button id="submitArrangeButton" class="primary-button full-width" type="button">送出排列</button>
          </div>

          <div class="game-section hidden" id="turnPanel">
            <div class="section-heading">
              <h4>卡牌位置</h4>
              <p id="turnHint">輪到你時擲骰並翻開對應位置。</p>
            </div>
            <div class="tabletop-board" id="boardCards"></div>
            <button id="rollButton" class="primary-button full-width" type="button">擲骰 / 執行回合</button>
          </div>

          <div class="game-section">
            <div class="section-heading">
              <h4>分數與狀態</h4>
            </div>
            <ul class="score-list" id="scoreList"></ul>
          </div>

          <div class="game-section hidden" id="finishedPanel">
            <div class="section-heading">
              <h4>遊戲結束</h4>
              <p id="winnerText"></p>
            </div>
          </div>
        </section>

        <p class="message" id="roomMessage" role="status"></p>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
